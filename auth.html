<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Secure login and registration for Expense Tracker" />
<title>Expense Tracker | Authentication</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="auth.css" />
</head>
<body>
<div class="auth-page">
<header class="auth-header">
<h1>Expense Tracker</h1>
<p>Secure access to your dashboard</p>
</header>

<section class="auth-panel" aria-label="Authentication actions">
<button id="openLoginModalBtn" class="auth-btn auth-login">Login</button>
<button id="openRegisterModalBtn" class="auth-btn auth-register">Register</button>
</section>

<section id="authStatusMessage" class="auth-status" aria-live="polite"></section>
<div class="auth-next-action hidden" id="authNextAction">
<button id="continueToDashboardBtn" class="auth-btn auth-login" type="button">Continue to Dashboard</button>
</div>
</div>

<div id="loginModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
<div class="modal-content">
<div class="modal-header">
<h2 id="loginTitle">Log In</h2>
<button id="closeLoginModalBtn" class="close-btn" aria-label="Close login modal">&times;</button>
</div>
<form id="loginForm" class="auth-form">
<div class="form-group">
<label for="loginUserName">user_name</label>
<input type="text" id="loginUserName" name="user_name" placeholder="Enter your user name" required />
</div>
<div class="form-group">
<label for="loginPassword">password</label>
<input type="password" id="loginPassword" name="password" placeholder="Enter your password" required />
</div>
<div class="form-actions">
<button type="submit" class="auth-btn auth-login">Log In</button>
</div>
</form>
</div>
</div>

<div id="registerModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="registerTitle">
<div class="modal-content">
<div class="modal-header">
<h2 id="registerTitle">Register</h2>
<button id="closeRegisterModalBtn" class="close-btn" aria-label="Close register modal">&times;</button>
</div>
<form id="registerForm" class="auth-form">
<div class="form-group">
<label for="registerUserName">user_name</label>
<input type="text" id="registerUserName" name="user_name" placeholder="Choose a user name" required />
</div>
<div class="form-group">
<label for="registerPassword">password</label>
<input type="password" id="registerPassword" name="password" placeholder="Create a password" required />
</div>
<div class="form-actions">
<button type="submit" class="auth-btn auth-register">Register user</button>
</div>
</form>
</div>
</div>

<script src="api.js"></script>
<script src="auth.js"></script>
</body>
</html>
